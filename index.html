<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip Planner</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="./icon.png">
  <link rel="icon" type="image/png" href="./favicon.png">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-zinc-950 text-white selection:bg-red-600 selection:text-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const DAYS = [
      { key: "2026-09-11", label: "Viernes", dateLabel: "11 Sep 2026" },
      { key: "2026-09-12", label: "Sábado", dateLabel: "12 Sep 2026" },
      { key: "2026-09-13", label: "Domingo", dateLabel: "13 Sep 2026" },
    ];

    const HOUR_START = 0;
    const HOUR_END = 24;
    const HOUR_HEIGHT = 64;
    const SNAP_MINUTES = 15;
    const MIN_EVENT_MINUTES = 30;
    const STORAGE_KEY = "trip-weekend-planner-events-v2";
    const GUTTER_WIDTH = 56;

    const ICONS = [
      { key: "plane", label: "Avión", icon: "✈️" },
      { key: "restaurant", label: "Restaurante", icon: "🍽️" },
      { key: "hotel", label: "Hotel", icon: "🏨" },
      { key: "home", label: "Casa", icon: "🏠" },
      { key: "museum", label: "Museo", icon: "🏛️" },
      { key: "park", label: "Parque", icon: "🌳" },
      { key: "train", label: "Tren", icon: "🚆" },
      { key: "bus", label: "Bus", icon: "🚌" },
      { key: "car", label: "Coche", icon: "🚗" },
      { key: "spa", label: "Spa", icon: "✨" },
      { key: "cocktail", label: "Coctelería", icon: "🍸" },
      { key: "walk", label: "Andando", icon: "🚶" },
    ];

    const PALETTES = [
      { card: "bg-sky-500/90", accent: "border-sky-300" },
      { card: "bg-violet-500/90", accent: "border-violet-300" },
      { card: "bg-emerald-500/90", accent: "border-emerald-300" },
      { card: "bg-rose-500/90", accent: "border-rose-300" },
      { card: "bg-amber-500/90", accent: "border-amber-300" },
      { card: "bg-cyan-500/90", accent: "border-cyan-300" },
      { card: "bg-fuchsia-500/90", accent: "border-fuchsia-300" },
      { card: "bg-lime-500/90", accent: "border-lime-300" },
      { card: "bg-orange-500/90", accent: "border-orange-300" },
      { card: "bg-indigo-500/90", accent: "border-indigo-300" },
      { card: "bg-teal-500/90", accent: "border-teal-300" },
      { card: "bg-pink-500/90", accent: "border-pink-300" },
    ];

    const sampleEvents = [
      {
        id: crypto.randomUUID(),
        day: "2026-09-11",
        title: "Vuelo a Milán",
        notes: "Salida desde Barcelona. Facturar equipaje y revisar puerta.",
        link: "",
        price: "89",
        pricePerPerson: false,
        icon: "plane",
        colorIndex: 0,
        start: 8 * 60 + 30,
        end: 10 * 60 + 10,
      },
      {
        id: crypto.randomUUID(),
        day: "2026-09-11",
        title: "Tren a Módena",
        notes: "Comprar billete con antelación.",
        link: "",
        price: "24",
        pricePerPerson: false,
        icon: "train",
        colorIndex: 2,
        start: 17 * 60,
        end: 18 * 60 + 40,
      },
      {
        id: crypto.randomUUID(),
        day: "2026-09-12",
        title: "Museo Ferrari",
        notes: "Llevar entrada y revisar el bus.",
        link: "",
        price: "31",
        pricePerPerson: false,
        icon: "museum",
        colorIndex: 1,
        start: 10 * 60,
        end: 12 * 60 + 30,
      },
    ];

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function snapMinutes(minutes) {
      return Math.round(minutes / SNAP_MINUTES) * SNAP_MINUTES;
    }

    function minutesToTime(minutes) {
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    }

    function yToMinutes(y) {
      const raw = HOUR_START * 60 + (y / HOUR_HEIGHT) * 60;
      return clamp(snapMinutes(raw), HOUR_START * 60, HOUR_END * 60);
    }

    function minutesToY(minutes) {
      return ((minutes - HOUR_START * 60) / 60) * HOUR_HEIGHT;
    }

    function getIconComponent(iconKey) {
      return ICONS.find((item) => item.key === iconKey)?.icon || "📅";
    }

    function buildEvent(day, start, end) {
      return {
        id: crypto.randomUUID(),
        day,
        title: "Nuevo plan",
        notes: "",
        link: "",
        price: "",
        pricePerPerson: false,
        icon: "train",
        colorIndex: Math.floor(Math.random() * PALETTES.length),
        start,
        end,
      };
    }

    function EventModal({ event, onClose, onSave, onDelete }) {
      const [draft, setDraft] = useState(event);

      const copyLinkToClipboard = async () => {
        if (!draft.link) return;
        try {
          await navigator.clipboard.writeText(draft.link);
        } catch {
          // ignore clipboard errors
        }
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/45 p-3 backdrop-blur-sm">
          <div className="w-full max-w-5xl rounded-3xl border border-white/70 bg-white shadow-2xl">
            <div className="flex items-center justify-between border-b border-slate-200 px-4 py-3">
              <h2 className="text-lg font-semibold text-slate-900">Editar bloque</h2>
              <button onClick={onClose} className="rounded-full p-1.5 text-slate-500 transition hover:bg-slate-100 hover:text-slate-800">
                <span className="text-lg leading-none">✖️</span>
              </button>
            </div>

            <div className="grid gap-4 px-4 py-4 lg:grid-cols-[1.6fr_1fr]">
              <div className="space-y-3">
                <label className="block">
                  <span className="mb-1.5 flex items-center gap-2 text-sm font-medium text-slate-700">
                    <span className="text-sm">✏️</span> Título
                  </span>
                  <input
                    value={draft.title}
                    onChange={(e) => setDraft({ ...draft, title: e.target.value })}
                    className="w-full rounded-2xl border border-slate-200 px-3 py-2.5 outline-none transition focus:border-slate-400"
                    placeholder="Ej. Tren a Módena"
                  />
                </label>

                <div className="grid grid-cols-2 gap-3">
                  <label className="block">
                    <span className="mb-1.5 flex items-center gap-2 text-sm font-medium text-slate-700">
                      <span className="text-sm">🕒</span> Inicio
                    </span>
                    <input
                      type="time"
                      step={900}
                      value={minutesToTime(draft.start)}
                      onChange={(e) => {
                        const [h, m] = e.target.value.split(":").map(Number);
                        const nextStart = h * 60 + m;
                        setDraft({ ...draft, start: nextStart, end: Math.max(nextStart + MIN_EVENT_MINUTES, draft.end) });
                      }}
                      className="w-full rounded-2xl border border-slate-200 px-3 py-2.5 outline-none transition focus:border-slate-400"
                    />
                  </label>
                  <label className="block">
                    <span className="mb-1.5 flex items-center gap-2 text-sm font-medium text-slate-700">
                      <span className="text-sm">🕒</span> Fin
                    </span>
                    <input
                      type="time"
                      step={900}
                      value={minutesToTime(draft.end)}
                      onChange={(e) => {
                        const [h, m] = e.target.value.split(":").map(Number);
                        const nextEnd = h * 60 + m;
                        setDraft({ ...draft, end: Math.max(draft.start + MIN_EVENT_MINUTES, nextEnd) });
                      }}
                      className="w-full rounded-2xl border border-slate-200 px-3 py-2.5 outline-none transition focus:border-slate-400"
                    />
                  </label>
                </div>

                <label className="block">
                  <span className="mb-1.5 flex items-center gap-2 text-sm font-medium text-slate-700">
                    <span className="text-sm">📝</span> Notas
                  </span>
                  <textarea
                    value={draft.notes}
                    onChange={(e) => setDraft({ ...draft, notes: e.target.value })}
                    rows={7}
                    className="w-full rounded-2xl border border-slate-200 px-3 py-2.5 outline-none transition focus:border-slate-400"
                    placeholder="Reserva, ideas, dirección, recordatorios..."
                  />
                </label>

                <div>
                  <span className="mb-1.5 flex items-center gap-2 text-sm font-medium text-slate-700">
                    <span className="text-sm">🔗</span> Enlace
                  </span>
                  <div className="grid grid-cols-[1fr_auto] gap-2">
                    <input
                      value={draft.link}
                      onChange={(e) => setDraft({ ...draft, link: e.target.value })}
                      className="w-full rounded-2xl border border-slate-200 px-3 py-2.5 outline-none transition focus:border-slate-400"
                      placeholder="https://..."
                    />
                    <button
                      type="button"
                      onClick={copyLinkToClipboard}
                      className="inline-flex items-center justify-center rounded-2xl border border-slate-200 px-3 py-2.5 text-slate-700 transition hover:bg-slate-50 disabled:opacity-40"
                      disabled={!draft.link}
                      title="Copiar enlace"
                    >
                      <span className="text-sm">📋</span>
                    </button>
                  </div>
                </div>
              </div>

              <div className="space-y-4">
                <div>
                  <p className="mb-2 text-sm font-medium text-slate-700">Icono</p>
                  <div className="grid grid-cols-6 gap-2">
                    {ICONS.map((item) => {
                      const selected = draft.icon === item.key;
                      return (
                        <button
                          key={item.key}
                          title={item.label}
                          onClick={() => setDraft({ ...draft, icon: item.key })}
                          className={`flex h-10 items-center justify-center rounded-xl border transition ${selected ? "border-slate-900 bg-slate-900 text-white" : "border-slate-200 bg-white text-slate-700 hover:border-slate-400"}`}
                        >
                          <span className="text-lg shrink-0">{item.icon}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>

                <div>
                  <p className="mb-2 text-sm font-medium text-slate-700">Color</p>
                  <div className="grid grid-cols-3 gap-2">
                    {PALETTES.map((palette, index) => (
                      <button
                        key={index}
                        onClick={() => setDraft({ ...draft, colorIndex: index })}
                        className={`h-12 rounded-2xl border-2 transition ${palette.card} ${draft.colorIndex === index ? "scale-95 border-slate-950" : "border-white"}`}
                      />
                    ))}
                  </div>
                </div>

                <div className="grid grid-cols-[1fr_auto] items-end gap-2">
                  <label className="block">
                    <span className="mb-1.5 flex items-center gap-2 text-sm font-medium text-slate-700">€ Precio</span>
                    <input
                      type="number"
                      min="0"
                      step="0.01"
                      value={draft.price ?? ""}
                      onChange={(e) => setDraft({ ...draft, price: e.target.value })}
                      className="w-full rounded-2xl border border-slate-200 px-3 py-2.5 outline-none transition focus:border-slate-400"
                      placeholder="Ej. 18.50"
                    />
                  </label>

                  <label className="flex h-[42px] items-center gap-2 rounded-2xl border border-slate-200 px-3 text-sm text-slate-700 whitespace-nowrap">
                    <input
                      type="checkbox"
                      checked={Boolean(draft.pricePerPerson)}
                      onChange={(e) => setDraft({ ...draft, pricePerPerson: e.target.checked })}
                      className="h-4 w-4 rounded"
                    />
                    <span>Precio por persona</span>
                  </label>
                </div>
              </div>
            </div>

            <div className="flex flex-wrap items-center justify-between gap-3 border-t border-slate-200 px-4 py-3">
              <button
                onClick={() => onDelete(draft.id)}
                className="inline-flex items-center gap-2 rounded-2xl border border-rose-200 px-3 py-2 text-sm font-medium text-rose-600 transition hover:bg-rose-50"
              >
                <span className="text-sm">🗑️</span> Eliminar
              </button>
              <div className="flex items-center gap-2">
                <button onClick={onClose} className="rounded-2xl border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50">Cancelar</button>
                <button
                  onClick={() => onSave({ ...draft, end: Math.max(draft.start + MIN_EVENT_MINUTES, draft.end) })}
                  className="rounded-2xl bg-slate-900 px-3 py-2 text-sm font-medium text-white transition hover:bg-slate-800"
                >
                  Guardar
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function DayHeader({ day, onCreateEvent }) {
      return (
        <div className="sticky top-0 z-20 border-b border-slate-200 bg-white/80 px-4 py-2.5 backdrop-blur">
          <div className="flex items-center justify-between gap-3">
            <div className="flex min-w-0 items-baseline gap-2.5">
              <div className="text-base font-semibold text-slate-900">{day.label}</div>
              <div className="truncate text-sm text-slate-500">{day.dateLabel}</div>
            </div>
            <button
              onClick={() => onCreateEvent(buildEvent(day.key, 9 * 60, 10 * 60), true)}
              className="inline-flex items-center gap-2 rounded-2xl border border-slate-200 px-2.5 py-1.5 text-sm font-medium text-slate-700 transition hover:border-slate-400 hover:bg-slate-50"
            >
              <span className="text-sm leading-none">➕</span> Añadir
            </button>
          </div>
        </div>
      );
    }

    function DayColumn({ day, events, onCreateEvent, onOpenEvent, onUpdateEvent, isPanning, onMiddleMouseDown }) {
      const contentRef = useRef(null);
      const dragState = useRef(null);
      const selectionState = useRef(null);
      const [selectionPreview, setSelectionPreview] = useState(null);

      const getPointerContentY = (clientY) => {
        if (!contentRef.current) return 0;
        const rect = contentRef.current.getBoundingClientRect();
        return clamp(clientY - rect.top, 0, rect.height);
      };

      const beginSelection = (event) => {
        if (event.button !== 0) return;
        if (!contentRef.current || event.target.closest("[data-event-card='true']")) return;
        const startY = getPointerContentY(event.clientY);
        const startMinutes = yToMinutes(startY);

        selectionState.current = {
          anchorMinutes: startMinutes,
          startMinutes,
          endMinutes: Math.min(startMinutes + MIN_EVENT_MINUTES, HOUR_END * 60),
          moved: false,
        };

        setSelectionPreview({
          top: minutesToY(startMinutes),
          height: (MIN_EVENT_MINUTES / 60) * HOUR_HEIGHT,
          startMinutes,
          endMinutes: Math.min(startMinutes + MIN_EVENT_MINUTES, HOUR_END * 60),
        });

        window.addEventListener("pointermove", onSelectionMove);
        window.addEventListener("pointerup", onSelectionEnd, { once: true });
      };

      const onSelectionMove = (event) => {
        if (!selectionState.current || !contentRef.current) return;
        const currentY = getPointerContentY(event.clientY);
        const currentMinutes = yToMinutes(currentY);
        const state = selectionState.current;
        state.moved = true;

        const start = Math.min(state.anchorMinutes, currentMinutes);
        const rawEnd = Math.max(state.anchorMinutes, currentMinutes);
        const end = Math.max(start + MIN_EVENT_MINUTES, rawEnd);

        state.startMinutes = start;
        state.endMinutes = Math.min(end, HOUR_END * 60);

        setSelectionPreview({
          top: minutesToY(state.startMinutes),
          height: ((state.endMinutes - state.startMinutes) / 60) * HOUR_HEIGHT,
          startMinutes: state.startMinutes,
          endMinutes: state.endMinutes,
        });
      };

      const onSelectionEnd = () => {
        window.removeEventListener("pointermove", onSelectionMove);
        const state = selectionState.current;
        if (state && state.moved) {
          onCreateEvent(buildEvent(day.key, state.startMinutes, state.endMinutes), true);
        }
        selectionState.current = null;
        setSelectionPreview(null);
      };

      const startDragMove = (e, item) => {
        e.stopPropagation();
        if (e.button !== 0) return;
        dragState.current = {
          type: "move",
          id: item.id,
          offset: getPointerContentY(e.clientY) - minutesToY(item.start),
          duration: item.end - item.start,
        };
        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("pointerup", onPointerUp, { once: true });
      };

      const startResize = (e, item, edge) => {
        e.stopPropagation();
        if (e.button !== 0) return;
        dragState.current = {
          type: edge,
          id: item.id,
          originalStart: item.start,
          originalEnd: item.end,
        };
        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("pointerup", onPointerUp, { once: true });
      };

      const onPointerMove = (e) => {
        if (!dragState.current) return;
        const pointerY = getPointerContentY(e.clientY);
        const minutes = yToMinutes(pointerY);
        const state = dragState.current;

        if (state.type === "move") {
          const newStart = clamp(snapMinutes(yToMinutes(pointerY - state.offset)), HOUR_START * 60, HOUR_END * 60 - state.duration);
          onUpdateEvent(state.id, { start: newStart, end: newStart + state.duration });
          return;
        }

        if (state.type === "resize-start") {
          const start = clamp(minutes, HOUR_START * 60, state.originalEnd - MIN_EVENT_MINUTES);
          onUpdateEvent(state.id, { start });
          return;
        }

        if (state.type === "resize-end") {
          const end = clamp(minutes, state.originalStart + MIN_EVENT_MINUTES, HOUR_END * 60);
          onUpdateEvent(state.id, { end });
        }
      };

      const onPointerUp = () => {
        dragState.current = null;
        window.removeEventListener("pointermove", onPointerMove);
      };

      return (
        <div className="relative min-w-[320px] flex-1 border-r border-slate-200/70 bg-white/28 last:border-r-0">
          <DayHeader day={day} onCreateEvent={onCreateEvent} />

          <div
            ref={contentRef}
            className={`relative ${isPanning ? "cursor-grabbing" : "cursor-crosshair"}`}
            onPointerDown={beginSelection}
            onMouseDown={onMiddleMouseDown}
            style={{ height: (HOUR_END - HOUR_START) * HOUR_HEIGHT }}
          >
            <div className="absolute inset-y-0 left-0 border-r border-slate-200/60" style={{ width: GUTTER_WIDTH }}>
              {Array.from({ length: HOUR_END - HOUR_START + 1 }).map((_, index) => {
                const hour = HOUR_START + index;
                return (
                  <div key={hour} className="relative text-right text-xs text-slate-400" style={{ height: HOUR_HEIGHT }}>
                    <span className="absolute right-2 -top-2.5 px-1">{String(hour).padStart(2, "0")}:00</span>
                  </div>
                );
              })}
            </div>

            <div className="absolute inset-y-0 right-0 overflow-hidden" style={{ left: GUTTER_WIDTH }}>
              {Array.from({ length: HOUR_END - HOUR_START }).map((_, index) => (
                <div key={index} className="absolute inset-x-0 border-t border-slate-200/90" style={{ top: index * HOUR_HEIGHT }} />
              ))}

              {selectionPreview ? (
                <>
                  <div
                    className="pointer-events-none absolute left-3 right-3 rounded-lg border-2 border-dashed border-sky-500 bg-sky-300/35 shadow-[0_0_0_1px_rgba(255,255,255,0.35)]"
                    style={{ top: selectionPreview.top, height: selectionPreview.height }}
                  />
                  <div
                    className="pointer-events-none absolute left-5 rounded-full bg-sky-600 px-2 py-1 text-[10px] font-semibold uppercase tracking-[0.18em] text-white shadow-lg"
                    style={{ top: Math.max(6, selectionPreview.top + 6) }}
                  >
                    {minutesToTime(selectionPreview.startMinutes)} - {minutesToTime(selectionPreview.endMinutes)}
                  </div>
                </>
              ) : null}

              {events.map((item) => {
                const top = minutesToY(item.start);
                const height = ((item.end - item.start) / 60) * HOUR_HEIGHT;
                const palette = PALETTES[item.colorIndex % PALETTES.length];
                const Icon = getIconComponent(item.icon);

                return (
                  <div
                    key={item.id}
                    data-event-card="true"
                    className={`group absolute left-3 right-3 cursor-pointer select-none rounded-lg border ${palette.accent} ${palette.card} text-white shadow-lg ring-1 ring-white/20 transition hover:scale-[1.01] ${item.end - item.start < 31 ? "px-3 py-1.5" : "px-3 py-2.5"}`}
                    style={{ top, height }}
                    onDoubleClick={() => onOpenEvent(item)}
                    onPointerDown={(e) => startDragMove(e, item)}
                    onMouseDown={onMiddleMouseDown}
                  >
                    <button
                      className="absolute inset-0 rounded-lg select-none"
                      onClick={(e) => {
                        e.stopPropagation();
                        onOpenEvent(item);
                      }}
                      aria-label={`Abrir ${item.title}`}
                    />

                    <div
                      className="absolute left-4 right-4 top-0.5 h-1.5 cursor-ns-resize rounded-full bg-white/30 opacity-0 transition group-hover:opacity-100"
                      onPointerDown={(e) => startResize(e, item, "resize-start")}
                      onMouseDown={onMiddleMouseDown}
                    />
                    <div
                      className="absolute bottom-0.5 left-4 right-4 h-1.5 cursor-ns-resize rounded-full bg-white/30 opacity-0 transition group-hover:opacity-100"
                      onPointerDown={(e) => startResize(e, item, "resize-end")}
                      onMouseDown={onMiddleMouseDown}
                    />

                    <div className="relative z-10 flex h-full flex-col gap-1 overflow-hidden pr-4 select-none">
                      <div className="flex items-center gap-2 text-sm font-semibold leading-tight md:text-[15px]">
                        <span className="text-sm shrink-0 leading-none">{Icon}</span>
                        <span className="truncate">{item.title}</span>
                        {item.price ? (
                          <span className="ml-auto inline-flex shrink-0 items-center gap-1 text-[11px] font-semibold uppercase tracking-[0.18em] text-white/90">
                            {item.price} €
                            {item.pricePerPerson ? <span className="text-xs">👤</span> : null}
                          </span>
                        ) : null}
                      </div>
                      <div className="flex items-center gap-2 text-[11px] font-semibold uppercase tracking-[0.18em] text-white/85"> 
                        <span>{minutesToTime(item.start)} - {minutesToTime(item.end)}</span>
                      </div>
                      {height > 80 && item.notes ? (
                        <div className="line-clamp-3 select-none text-xs leading-relaxed text-white/85">{item.notes}</div>
                      ) : null}
                      {height > 110 && item.link ? (
                        <div className="truncate select-none text-xs text-white/80">{item.link}</div>
                      ) : null}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [events, setEvents] = useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (!saved) return sampleEvents;
          const parsed = JSON.parse(saved);
          return Array.isArray(parsed) ? parsed : sampleEvents;
        } catch {
          return sampleEvents;
        }
      });
      const [editingEvent, setEditingEvent] = useState(null);
      const scrollRef = useRef(null);
      const panState = useRef(null);
      const [isPanning, setIsPanning] = useState(false);

      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
        } catch {
          // ignore storage errors
        }
      }, [events]);

      useEffect(() => {
        return () => {
          window.removeEventListener("mousemove", handlePanMove);
          window.removeEventListener("mouseup", stopPan);
        };
      }, []);

      const groupedEvents = useMemo(() => {
        return DAYS.reduce((acc, day) => {
          acc[day.key] = events
            .filter((event) => event.day === day.key)
            .sort((a, b) => a.start - b.start);
          return acc;
        }, {});
      }, [events]);

      const createEvent = (event, openAfterCreate = false) => {
        setEvents((prev) => [...prev, event]);
        if (openAfterCreate) setEditingEvent(event);
      };

      const updateEvent = (id, updates) => {
        setEvents((prev) => prev.map((event) => (event.id === id ? { ...event, ...updates } : event)));
        setEditingEvent((prev) => (prev && prev.id === id ? { ...prev, ...updates } : prev));
      };

      const saveEvent = (updatedEvent) => {
        setEvents((prev) => prev.map((event) => (event.id === updatedEvent.id ? updatedEvent : event)));
        setEditingEvent(null);
      };

      const deleteEvent = (id) => {
        setEvents((prev) => prev.filter((event) => event.id !== id));
        setEditingEvent(null);
      };

      function handlePanMove(event) {
        if (!panState.current || !scrollRef.current) return;
        const dx = event.clientX - panState.current.startX;
        const dy = event.clientY - panState.current.startY;
        scrollRef.current.scrollLeft = panState.current.scrollLeft - dx;
        scrollRef.current.scrollTop = panState.current.scrollTop - dy;
      }

      function stopPan() {
        panState.current = null;
        setIsPanning(false);
        window.removeEventListener("mousemove", handlePanMove);
        window.removeEventListener("mouseup", stopPan);
      }

      const handleMiddleMouseDown = (event) => {
        if (event.button !== 1 || !scrollRef.current) return;
        event.preventDefault();
        panState.current = {
          startX: event.clientX,
          startY: event.clientY,
          scrollLeft: scrollRef.current.scrollLeft,
          scrollTop: scrollRef.current.scrollTop,
        };
        setIsPanning(true);
        window.addEventListener("mousemove", handlePanMove);
        window.addEventListener("mouseup", stopPan);
      };

      return (
        <div className="h-screen overflow-hidden bg-[radial-gradient(circle_at_top,_rgba(56,189,248,0.14),_transparent_28%),linear-gradient(180deg,_#f9fbff_0%,_#eff4fb_100%)] text-slate-900">
          <div ref={scrollRef} className={`${isPanning ? "cursor-grabbing" : "cursor-default"} h-full overflow-auto`}>
            <div className="grid min-w-[1200px] grid-cols-3">
              {DAYS.map((day) => (
                <DayColumn
                  key={day.key}
                  day={day}
                  events={groupedEvents[day.key] || []}
                  onCreateEvent={createEvent}
                  onOpenEvent={setEditingEvent}
                  onUpdateEvent={updateEvent}
                  isPanning={isPanning}
                  onMiddleMouseDown={handleMiddleMouseDown}
                />
              ))}
            </div>
          </div>

          {editingEvent ? (
            <EventModal
              event={editingEvent}
              onClose={() => setEditingEvent(null)}
              onSave={saveEvent}
              onDelete={deleteEvent}
            />
          ) : null}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
